spring:
  application:
    name: anomaly-detection
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      authorizationserver:
        issuer: ${AUTH_SERVER_ISSUER:http://localhost:44397}

server:
  port: 44397

management:
  endpoints:
    web:
      exposure:
        include: health, info, mappings
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.anomalydetection: INFO