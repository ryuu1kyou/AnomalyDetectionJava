spring:
  datasource:
    url: jdbc:mysql://localhost:3306/anomaly_detection?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    # local dev default (override via env ANOMALY_DB_PASSWORD)
    # WSL: ANOMALY_DB_PASSWORD='***'
    # Windows: default 123
    password: ${ANOMALY_DB_PASSWORD:123}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.anomalydetection: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG