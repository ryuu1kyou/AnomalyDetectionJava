databaseChangeLog:
  - logicalFilePath: db/changelog/009-shedlock.yaml

  - changeSet:
      id: 009-001-shedlock
      author: m3-crosscutting
      comment: "ShedLock distributed lock table"
      changes:
        - sql:
            sql: >
              CREATE TABLE shedlock (
                name VARCHAR(64) NOT NULL,
                lock_until TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3),
                locked_at TIMESTAMP(3) NOT NULL DEFAULT '2000-01-01 00:00:00.000',
                locked_by VARCHAR(255) NOT NULL,
                PRIMARY KEY (name)
              )
