databaseChangeLog:
  - logicalFilePath: db/changelog/013-detectiontemplates.yaml

  - changeSet:
      id: 013-create-detection-templates
      author: m4-detectiontemplates
      comment: "Detection templates"
      changes:
        - createTable:
            tableName: detection_templates
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BINARY(16)
              - column:
                  name: name
                  type: VARCHAR(256)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(1024)
              - column:
                  name: can_signal_id
                  type: BINARY(16)
              - column:
                  name: expression
                  type: TEXT
              - column:
                  name: threshold
                  type: DOUBLE
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              # FullAuditedEntity columns
              - column:
                  name: created_at
                  type: datetime(6)
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BINARY(16)
              - column:
                  name: last_modified_at
                  type: datetime(6)
              - column:
                  name: last_modified_by
                  type: BINARY(16)
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: datetime(6)
              - column:
                  name: deleted_by
                  type: BINARY(16)
