databaseChangeLog:
  - logicalFilePath: db/changelog/003-oauth2-authorization-server.yaml

  - changeSet:
      id: 003-001-oauth2-registered-client
      author: m2-migration
      changes:
        - createTable:
            tableName: oauth2_registered_client
            columns:
              - column:
                  name: id
                  type: VARCHAR(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: client_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: client_id_issued_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: client_secret
                  type: VARCHAR(200)
              - column:
                  name: client_secret_expires_at
                  type: TIMESTAMP
              - column:
                  name: client_name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: client_authentication_methods
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: authorization_grant_types
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: redirect_uris
                  type: VARCHAR(1000)
              - column:
                  name: post_logout_redirect_uris
                  type: VARCHAR(1000)
              - column:
                  name: scopes
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: client_settings
                  type: VARCHAR(2000)
                  constraints:
                    nullable: false
              - column:
                  name: token_settings
                  type: VARCHAR(2000)
                  constraints:
                    nullable: false

  - changeSet:
      id: 003-002-oauth2-authorization
      author: m2-migration
      changes:
        - createTable:
            tableName: oauth2_authorization
            columns:
              - column:
                  name: id
                  type: VARCHAR(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: registered_client_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: principal_name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: authorization_grant_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: authorized_scopes
                  type: VARCHAR(1000)
              - column:
                  name: attributes
                  type: BLOB
              - column:
                  name: state
                  type: VARCHAR(500)
              - column:
                  name: authorization_code_value
                  type: BLOB
              - column:
                  name: authorization_code_issued_at
                  type: TIMESTAMP
              - column:
                  name: authorization_code_expires_at
                  type: TIMESTAMP
              - column:
                  name: authorization_code_metadata
                  type: BLOB
              - column:
                  name: access_token_value
                  type: BLOB
              - column:
                  name: access_token_issued_at
                  type: TIMESTAMP
              - column:
                  name: access_token_expires_at
                  type: TIMESTAMP
              - column:
                  name: access_token_metadata
                  type: BLOB
              - column:
                  name: access_token_type
                  type: VARCHAR(100)
              - column:
                  name: access_token_scopes
                  type: VARCHAR(1000)
              - column:
                  name: oidc_id_token_value
                  type: BLOB
              - column:
                  name: oidc_id_token_issued_at
                  type: TIMESTAMP
              - column:
                  name: oidc_id_token_expires_at
                  type: TIMESTAMP
              - column:
                  name: oidc_id_token_metadata
                  type: BLOB
              - column:
                  name: refresh_token_value
                  type: BLOB
              - column:
                  name: refresh_token_issued_at
                  type: TIMESTAMP
              - column:
                  name: refresh_token_expires_at
                  type: TIMESTAMP
              - column:
                  name: refresh_token_metadata
                  type: BLOB
              - column:
                  name: user_code_value
                  type: BLOB
              - column:
                  name: user_code_issued_at
                  type: TIMESTAMP
              - column:
                  name: user_code_expires_at
                  type: TIMESTAMP
              - column:
                  name: user_code_metadata
                  type: BLOB
              - column:
                  name: device_code_value
                  type: BLOB
              - column:
                  name: device_code_issued_at
                  type: TIMESTAMP
              - column:
                  name: device_code_expires_at
                  type: TIMESTAMP
              - column:
                  name: device_code_metadata
                  type: BLOB

  - changeSet:
      id: 003-003-oauth2-authorization-consent
      author: m2-migration
      changes:
        - createTable:
            tableName: oauth2_authorization_consent
            columns:
              - column:
                  name: registered_client_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: principal_name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: authorities
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: oauth2_authorization_consent
            columnNames: registered_client_id, principal_name
