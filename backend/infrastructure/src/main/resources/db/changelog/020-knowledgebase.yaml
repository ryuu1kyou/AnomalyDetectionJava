databaseChangeLog:
  - logicalFilePath: db/changelog/020-knowledgebase.yaml

  - changeSet:
      id: 020-001-knowledge-articles
      author: m4-knowledgebase
      comment: "KnowledgeArticle aggregate"
      changes:
        - createTable:
            tableName: knowledge_articles
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BINARY(16)
              - column:
                  name: title
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: LONGTEXT
                  constraints:
                    nullable: false
              - column:
                  name: summary
                  type: VARCHAR(2000)
              - column:
                  name: category
                  type: VARCHAR(32)
              - column:
                  name: tags
                  type: LONGTEXT
              - column:
                  name: view_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: useful_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: is_published
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: published_at
                  type: DATETIME(3)
              - column:
                  name: related_anomaly_id
                  type: BINARY(16)
              - column:
                  name: detection_logic_id
                  type: BINARY(16)
              - column:
                  name: can_signal_id
                  type: BINARY(16)
              - column:
                  name: anomaly_type
                  type: VARCHAR(32)
              - column:
                  name: signal_name
                  type: VARCHAR(200)
              - column:
                  name: symptom
                  type: VARCHAR(2000)
              - column:
                  name: cause
                  type: VARCHAR(2000)
              - column:
                  name: countermeasure
                  type: VARCHAR(2000)
              - column:
                  name: has_solution
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: solution_steps
                  type: LONGTEXT
              - column:
                  name: prevention_measures
                  type: LONGTEXT
              - column:
                  name: average_rating
                  type: DOUBLE
                  defaultValueNumeric: 0.0
                  constraints:
                    nullable: false
              - column:
                  name: rating_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              # FullAuditedEntity columns
              - column:
                  name: created_at
                  type: datetime(6)
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BINARY(16)
              - column:
                  name: last_modified_at
                  type: datetime(6)
              - column:
                  name: last_modified_by
                  type: BINARY(16)
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: datetime(6)
              - column:
                  name: deleted_by
                  type: BINARY(16)

        - createIndex:
            tableName: knowledge_articles
            indexName: idx_ka_tenant_id
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: knowledge_articles
            indexName: idx_ka_category
            columns:
              - column:
                  name: category
        - createIndex:
            tableName: knowledge_articles
            indexName: idx_ka_is_published
            columns:
              - column:
                  name: is_published

  - changeSet:
      id: 020-002-knowledge-article-comments
      author: m4-knowledgebase
      comment: "KnowledgeArticleComment entity"
      changes:
        - createTable:
            tableName: knowledge_article_comments
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: article_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
              - column:
                  name: tenant_id
                  type: BINARY(16)
              - column:
                  name: author_user_id
                  type: BINARY(16)
              - column:
                  name: author_name
                  type: VARCHAR(200)
              - column:
                  name: content
                  type: VARCHAR(2000)
                  constraints:
                    nullable: false
              - column:
                  name: rating
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              # FullAuditedEntity columns
              - column:
                  name: created_at
                  type: datetime(6)
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BINARY(16)
              - column:
                  name: last_modified_at
                  type: datetime(6)
              - column:
                  name: last_modified_by
                  type: BINARY(16)
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: datetime(6)
              - column:
                  name: deleted_by
                  type: BINARY(16)

        - createIndex:
            tableName: knowledge_article_comments
            indexName: idx_kac_article_id
            columns:
              - column:
                  name: article_id
